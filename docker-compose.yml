services:
  ogg2wav:
    # Pull the published image, or build locally with `docker compose build`.
    image: ghcr.io/ysalitrynskyi/ogg2wav-converter:latest
    build: .
    ports:
      - "5000:5000"
    environment:
      # All optional -- defaults preserve original behavior.
      # PORT: "5000"
      # WEB_CONCURRENCY: "2"
      # FFMPEG_TIMEOUT: "60"
      # MAX_CONTENT_LENGTH: "104857600"
      LOG_LEVEL: "info"
    restart: unless-stopped
